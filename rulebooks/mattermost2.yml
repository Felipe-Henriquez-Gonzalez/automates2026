---
- name: Regla para reparar desde Mattermost
  hosts: all

  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5010

  rules:
    - name: Ejecutar reparar cuando llegue reiniciar
      condition: >
        event.source == "mattermost" and
        event.channel_name == "atuomates26" and
        event.text == "reiniciar"
      action:
        run_workflow_template:
          name: mariadb remediation
          organization: Default
