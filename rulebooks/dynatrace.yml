---
- name: Listen for events on a webhook from Dynatace
  hosts: all
  sources:
    - name: Listen for alerts from Dynatrace
      eda.builtin.webhook:
        host: 0.0.0.0
        port: 4997

  rules:
    - name: Maria DB Fail
      condition: event.payload.eventData['event.name'] == "Service is in an undesirable state"
      action:
        run_workflow_template:
          name: "alerta dynatrace"
          organization: "Default"

