- name: Eliminar línea con variable en my.cnf y reiniciar MariaDB
  hosts: all
  become: yes
  vars:
    variable_a_borrar: 

  tasks:
    - name: Eliminar línea que contiene la variable
      ansible.builtin.lineinfile:
        path: /etc/my.cnf
        state: absent
        regexp: "{{ variable_a_borrar }}"
        backup: yes
      notify: Reiniciar MariaDB

  handlers:
    - name: Reiniciar MariaDB
      ansible.builtin.service:
        name: mariadb
        state: restarted
